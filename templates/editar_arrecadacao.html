{% extends "base.html" %}

{% block title %}Editar Arrecadação{% endblock %}
{% block page_title %}Editar Arrecadação{% endblock %}

{% block page_content %}
<h3 class="mb-4">Editar arrecadação</h3>

<form method="POST">
    <div class="mb-3">
        <label class="form-label">Valor</label>
        <input type="number" step="0.01" name="valor" class="form-control" value="{{ arrecadacao.valor }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Data</label>
        <input type="date" name="data_lancamento" class="form-control" value="{{ arrecadacao.data_lancamento }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Observação</label>
        <input type="text" name="observacao" class="form-control" value="{{ arrecadacao.observacao }}">
    </div>

    <button type="submit" class="btn btn-success">Salvar alterações</button>
</form>
{% endblock %}
