{% extends "base.html" %}

{% block title %}Editar Arrecadação{% endblock %}
{% block page_title %}Editar Arrecadação{% endblock %}

{% block page_content %}
<div class="mb-4">
    <h3 class="mb-1 fw-bold">Editar arrecadação</h3>
    <p class="text-muted mb-0">Atualize o valor, data e observação do lançamento.</p>
</div>

<div class="card p-4 shadow-sm border-0">
    <form method="POST">
        <div class="row g-3">

            <div class="col-md-4">
                <label class="form-label">Valor</label>
                <input type="number" step="0.01" name="valor" class="form-control" value="{{ arrecadacao.valor }}" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Data</label>
                <input type="date" name="data_lancamento" class="form-control" value="{{ arrecadacao.data_lancamento }}" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Observação</label>
                <input type="text" name="observacao" class="form-control" value="{{ arrecadacao.observacao }}">
            </div>

        </div>

        <div class="mt-4 d-flex gap-2">
            <button class="btn btn-primary">
                <i class="bi bi-save-fill me-1"></i> Salvar alterações
            </button>
            <a href="/participantes/{{ arrecadacao.participante_id }}" class="btn btn-outline-secondary">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
