{% extends "base_login.html" %}

{% block title %}Login{% endblock %}

{% block page_content %}
<div class="login-card">
    <h2 class="text-center mb-2">Sistema Cadepa</h2>
    <p class="text-center text-muted mb-4">Acesse o painel administrativo</p>

    <form method="POST" action="/login">
        <div class="mb-3">
            <label class="form-label">Usuário</label>
            <input type="text" name="usuario" class="form-control" placeholder="Digite seu usuário" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Senha</label>
            <input type="password" name="senha" class="form-control" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn btn-dark w-100">Entrar</button>
    </form>

    <form method="POST" action="/demo" class="mt-2">
        <button type="submit" class="btn btn-outline-secondary w-100">
            Entrar em demonstração
        </button>
    </form>
</div>
{% endblock %}
