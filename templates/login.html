{% extends "base_login.html" %}

{% block title %}Login{% endblock %}

{% block page_content %}
<div class="login-card">
    <h2 class="text-center mb-2">Sistema Cadepa</h2>
    <p class="text-center text-muted mb-4">Acesse o painel administrativo</p>

    <form method="POST" action="/login">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label">Usuário</label>
            <input type="text" name="usuario" class="form-control" placeholder="Digite seu usuário" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Senha</label>
            <input type="password" id="senhaLogin" name="senha" class="form-control" placeholder="Digite sua senha" required>
            <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" id="mostrarSenhaLogin">
                <label class="form-check-label" for="mostrarSenhaLogin">Visualizar senha</label>
            </div>
        </div>

        <button type="submit" class="btn btn-dark w-100">Entrar</button>
    </form>

    <form method="POST" action="/demo" class="mt-2">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="mb-2">
            <label class="form-label">Senha demonstração</label>
            <input type="password" id="senhaDemo" name="senha_demo" class="form-control" placeholder="Digite a senha do modo demo" required>
            <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" id="mostrarSenhaDemo">
                <label class="form-check-label" for="mostrarSenhaDemo">Visualizar senha</label>
            </div>
        </div>
        <button type="submit" class="btn btn-outline-secondary w-100">
            Entrar em demonstração
        </button>
    </form>
</div>

<script>
const senhaLogin = document.getElementById("senhaLogin");
const mostrarSenhaLogin = document.getElementById("mostrarSenhaLogin");
const senhaDemo = document.getElementById("senhaDemo");
const mostrarSenhaDemo = document.getElementById("mostrarSenhaDemo");

mostrarSenhaLogin.addEventListener("change", () => {
    senhaLogin.type = mostrarSenhaLogin.checked ? "text" : "password";
});

mostrarSenhaDemo.addEventListener("change", () => {
    senhaDemo.type = mostrarSenhaDemo.checked ? "text" : "password";
});
</script>
{% endblock %}
