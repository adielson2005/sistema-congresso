  {% extends "base.html" %}

{% block title %}Cadastrar Participante{% endblock %}
{% block page_title %}Cadastrar Participante{% endblock %}

{% block page_content %}
<div class="mb-4">
    <h3 class="mb-1">Novo Participante</h3>
    <p class="text-muted mb-0">Preencha os dados abaixo para cadastrar um novo participante.</p>
</div>

<form method="POST" action="/participantes/cadastrar">
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Nome completo</label>
            <input type="text" name="nome_completo" class="form-control" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Data de nascimento</label>
            <input type="date" name="data_nascimento" class="form-control" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">CPF</label>
            <input type="text" name="cpf" class="form-control" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">E-mail</label>
            <input type="email" name="email" class="form-control">
        </div>

        <div class="col-md-6">
            <label class="form-label">Número</label>
            <input type="text" name="numero" class="form-control">
        </div>

        <div class="col-md-6">
            <label class="form-label">Nome da mãe</label>
            <input type="text" name="nome_mae" class="form-control">
        </div>

        <div class="col-md-6">
            <label class="form-label">Macro</label>
            <select name="macro" id="macro" class="form-select" required>
                <option value="">Selecione a macro</option>
                {% for macro in macros %}
                    <option value="{{ macro.id }}">{{ macro.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-6">
            <label class="form-label">Congregação</label>
            <select name="congregacao" id="congregacao" class="form-select" required>
                <option value="">Selecione primeiro a macro</option>
            </select>
        </div>
    </div>

    <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-success">Salvar participante</button>
        <a href="/participantes" class="btn btn-outline-secondary">Cancelar</a>
    </div>
</form>

<script>
    const macroSelect = document.getElementById("macro");
    const congregacaoSelect = document.getElementById("congregacao");

    macroSelect.addEventListener("change", async function () {
        const macroId = this.value;

        congregacaoSelect.innerHTML = '<option value="">Carregando...</option>';

        if (!macroId) {
            congregacaoSelect.innerHTML = '<option value="">Selecione primeiro a macro</option>';
            return;
        }

        const response = await fetch(`/api/congregacoes/${macroId}`);
        const congregacoes = await response.json();

        congregacaoSelect.innerHTML = '<option value="">Selecione a congregação</option>';

        congregacoes.forEach(congregacao => {
            const option = document.createElement("option");
            option.value = congregacao.nome;
            option.textContent = congregacao.nome;
            congregacaoSelect.appendChild(option);
        });
    });
</script>
{% endblock %}
