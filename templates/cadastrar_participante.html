{% extends "base.html" %}

{% block title %}Cadastrar Participante{% endblock %}
{% block page_title %}Cadastrar Participante{% endblock %}

{% block page_content %}
<div class="page-header">
    <h3>Novo participante</h3>
    <p>Preencha os dados abaixo e vincule o participante à macro e congregação corretas.</p>
</div>

<div class="surface-card">
    <form method="POST">
        <div class="row g-3">

            <div class="col-md-6">
                <label class="form-label">Nome completo</label>
                <input type="text" name="nome_completo" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Data nascimento</label>
                <input type="date" name="data_nascimento" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">CPF</label>
                <input type="text" name="cpf" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control">
            </div>

            <div class="col-md-4">
                <label class="form-label">Telefone</label>
                <input type="text" name="numero" class="form-control">
            </div>

            <div class="col-md-6">
                <label class="form-label">Nome da mãe</label>
                <input type="text" name="nome_mae" class="form-control">
            </div>

            <div class="col-md-3">
                <label class="form-label">Macro</label>
                <select id="macro" class="form-select" required>
                    <option value="">Selecione</option>
                    {% for macro in macros %}
                        <option value="{{ macro.id }}">{{ macro.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Congregação</label>
                <select name="congregacao" id="congregacao" class="form-select" required>
                    <option value="">Selecione a macro primeiro</option>
                </select>
            </div>

        </div>

        <div class="mt-4 d-flex gap-2">
            <button class="btn btn-primary">
                <i class="bi bi-save-fill me-1"></i> Salvar
            </button>
            <a href="/participantes" class="btn btn-outline-secondary">Voltar</a>
        </div>
    </form>
</div>

<script>
const macro = document.getElementById("macro");
const congregacao = document.getElementById("congregacao");

macro.addEventListener("change", async () => {
    const id = macro.value;

    if (!id) {
        congregacao.innerHTML = "<option>Selecione a macro</option>";
        return;
    }

    const res = await fetch(`/api/congregacoes/${id}`);
    const data = await res.json();

    congregacao.innerHTML = "<option value=''>Selecione</option>";

    data.forEach(c => {
        congregacao.innerHTML += `<option value="${c.nome}">${c.nome}</option>`;
    });
});
</script>
{% endblock %}
