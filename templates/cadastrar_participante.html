{% extends "base.html" %}

{% block title %}Cadastrar Participante{% endblock %}
{% block page_title %}Cadastrar Participante{% endblock %}

{% block page_content %}
<div class="page-header">
    <h3>Novo participante</h3>
    <p>Preencha os dados abaixo e vincule o participante à macro e congregação corretas.</p>
</div>

<div class="surface-card">
    <form method="POST">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">

            <div class="col-md-6">
                <label class="form-label">Nome completo</label>
                <input type="text" name="nome_completo" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Data nascimento</label>
                <input type="date" name="data_nascimento" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">CPF</label>
                <input type="text" name="cpf" class="form-control" inputmode="numeric" maxlength="14" placeholder="000.000.000-00" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control">
            </div>

            <div class="col-md-4">
                <label class="form-label">Telefone</label>
                <input type="text" name="numero" class="form-control" inputmode="numeric" maxlength="15" placeholder="(00) 00000-0000">
            </div>

            <div class="col-md-6">
                <label class="form-label">Nome da mãe</label>
                <input type="text" name="nome_mae" class="form-control">
            </div>

            <div class="col-md-3">
                <label class="form-label">Macro</label>
                <select id="macro" class="form-select" required>
                    <option value="">Selecione</option>
                    {% for macro in macros %}
                        <option value="{{ macro.id }}">{{ macro.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Congregação</label>
                <select name="congregacao" id="congregacao" class="form-select" required>
                    <option value="">Selecione a macro primeiro</option>
                </select>
            </div>

        </div>

        <div class="mt-4 d-flex gap-2">
            <button class="btn btn-primary">
                <i class="bi bi-save-fill me-1"></i> Salvar
            </button>
            <a href="/participantes" class="btn btn-outline-secondary">Voltar</a>
        </div>
    </form>
</div>

<script>
const macro = document.getElementById("macro");
const congregacao = document.getElementById("congregacao");
const cpfInput = document.querySelector('input[name="cpf"]');
const telefoneInput = document.querySelector('input[name="numero"]');

function aplicarMascaraCPF(valor) {
    const digitos = valor.replace(/\D/g, "").slice(0, 11);
    return digitos
        .replace(/(\d{3})(\d)/, "$1.$2")
        .replace(/(\d{3})(\d)/, "$1.$2")
        .replace(/(\d{3})(\d{1,2})$/, "$1-$2");
}

function aplicarMascaraTelefone(valor) {
    const digitos = valor.replace(/\D/g, "").slice(0, 11);

    if (digitos.length <= 10) {
        return digitos
            .replace(/(\d{2})(\d)/, "($1) $2")
            .replace(/(\d{4})(\d)/, "$1-$2");
    }

    return digitos
        .replace(/(\d{2})(\d)/, "($1) $2")
        .replace(/(\d{5})(\d)/, "$1-$2");
}

async function carregarCongregacoes(macroId, congregacaoSelecionada = "") {
    const id = macroId;

    if (!id) {
        congregacao.innerHTML = "<option value=''>Selecione a macro</option>";
        return;
    }

    const res = await fetch(`/api/congregacoes/${id}`);
    const data = await res.json();

    congregacao.innerHTML = "<option value=''>Selecione</option>";

    data.forEach(c => {
        const selecionada = c.nome === congregacaoSelecionada ? "selected" : "";
        congregacao.innerHTML += `<option value="${c.nome}" ${selecionada}>${c.nome}</option>`;
    });
}

macro.addEventListener("change", () => carregarCongregacoes(macro.value));
cpfInput.addEventListener("input", () => {
    cpfInput.value = aplicarMascaraCPF(cpfInput.value);
});
telefoneInput.addEventListener("input", () => {
    telefoneInput.value = aplicarMascaraTelefone(telefoneInput.value);
});
</script>
{% endblock %}
