{% extends "base_login.html" %}

{% block title %}Login Caixa{% endblock %}

{% block page_content %}
<div class="login-card">
    <h2 class="text-center mb-2">Caixa Adolescentes</h2>
    <p class="text-center text-muted mb-4">Acesso exclusivo para administração do caixa</p>

    <form method="POST" action="/caixa/login">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label">Usuário do caixa</label>
            <input type="text" name="usuario" class="form-control" placeholder="Digite o usuário do caixa" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Senha do caixa</label>
            <input type="password" id="senhaCaixa" name="senha" class="form-control" placeholder="Digite a senha do caixa" required>
            <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" id="mostrarSenhaCaixa">
                <label class="form-check-label" for="mostrarSenhaCaixa">Visualizar senha</label>
            </div>
        </div>

        <button type="submit" class="btn btn-success w-100">Entrar no caixa</button>
    </form>

    <a href="/login" class="btn btn-outline-secondary w-100 mt-2">
        <i class="bi bi-arrow-left me-1"></i> Voltar para login do congresso
    </a>
</div>

<script>
const senhaCaixa = document.getElementById("senhaCaixa");
const mostrarSenhaCaixa = document.getElementById("mostrarSenhaCaixa");

mostrarSenhaCaixa.addEventListener("change", () => {
    senhaCaixa.type = mostrarSenhaCaixa.checked ? "text" : "password";
});
</script>
{% endblock %}
